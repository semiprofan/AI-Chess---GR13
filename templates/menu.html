<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - AI Cờ Vua</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .menu-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        h1 { color: #333; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #555; }
        select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        .btn-start { background-color: #4CAF50; color: white; border: none; padding: 15px; width: 100%; font-size: 18px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: background 0.3s; margin-top: 10px; }
        .btn-start:hover { background-color: #45a049; }
    </style>
</head>
<body>

    <div class="menu-container">
        <h1>Tùy Chọn Trận Đấu ♟️</h1>
        <form action="/game" method="GET">
            
            <div class="form-group">
                <label>Thời gian mỗi bên:</label>
                <select name="time">
                    <option value="300">⏱️ 5 Phút (Cờ chớp)</option>
                    <option value="600" selected>⏳ 10 Phút (Cờ nhanh)</option>
                    <option value="900">🕰️ 15 Phút</option>
                    <option value="1200">🐢 20 Phút</option>
                    <option value="1800">☕ 30 Phút (Cờ tiêu chuẩn)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Chọn Phe:</label>
                <select name="color">
                    <option value="w">⚪ Trắng (Đi trước)</option>
                    <option value="b">⚫ Đen (Đi sau)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Độ khó của AI:</label>
                <select name="depth">
                    <option value="2">👶 Dễ (Tính toán nhanh)</option>
                    <option value="3" selected>🤓 Trung bình</option>
                    <option value="4">🧠 Khó (Tính toán sâu)</option>
                </select>
            </div>

            <button type="submit" class="btn-start">VÀO TRẬN ⚔️</button>
        </form>
    </div>

</body>
</html>
